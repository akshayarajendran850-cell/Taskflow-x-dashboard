<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow X Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins";}

/* LOGIN SCREEN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#000,#0a0f2c);
}

.login-box{
  background:#111;
  padding:30px;
  border-radius:15px;
  box-shadow:0 0 20px #00f2ff33;
  text-align:center;
}

.login-box input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#222;
  color:#fff;
}

.login-box button{
  width:100%;
  padding:10px;
  background:#00f2ff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:none;
  height:100vh;
  background:#0a0f2c;
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#111;
  height:100%;
  padding:20px;
  float:left;
}

.sidebar h2{
  color:#00f2ff;
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#1a1a1a;
  border:none;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  text-align:left;
  transition:0.3s;
}

.sidebar button:hover{
  background:#00f2ff;
  color:#000;
}

/* MAIN */
.main{
  margin-left:250px;
  padding:20px;
}

/* CARDS */
.cards{
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.card{
  flex:1;
  background:#111;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 10px #00f2ff33;
}

/* TASK INPUT */
.input-box{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.input-box input,select{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#222;
  color:#fff;
}

.input-box button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00f2ff;
  cursor:pointer;
}

/* TASK LIST */
li{
  list-style:none;
  background:#111;
  padding:10px;
  border-radius:10px;
  margin:8px 0;
  display:flex;
  justify-content:space-between;
  transition:0.3s;
}

li:hover{transform:scale(1.02);}

.completed span{text-decoration:line-through;color:#888;}

.actions i{
  margin-left:10px;
  cursor:pointer;
}

/* PROGRESS */
.progress{
  height:8px;
  background:#333;
  border-radius:10px;
  margin:10px 0;
}
.progress-bar{
  height:100%;
  background:#00f2ff;
  width:0%;
  border-radius:10px;
  transition:0.4s;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>TaskFlow Login</h2>
    <input id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>TaskFlow X</h2>
    <button><i class="fa fa-home"></i> Dashboard</button>
    <button><i class="fa fa-tasks"></i> Tasks</button>
    <button><i class="fa fa-chart-line"></i> Analytics</button>
    <button onclick="logout()"><i class="fa fa-sign-out"></i> Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- CARDS -->
    <div class="cards">
      <div class="card"><h3 id="total">0</h3><p>Total Tasks</p></div>
      <div class="card"><h3 id="done">0</h3><p>Completed</p></div>
      <div class="card"><h3 id="pending">0</h3><p>Pending</p></div>
    </div>

    <!-- INPUT -->
    <div class="input-box">
      <input id="task" placeholder="New Task">
      <select id="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>
      <button onclick="addTask()">+</button>
    </div>

    <!-- PROGRESS -->
    <div class="progress"><div id="bar" class="progress-bar"></div></div>

    <!-- TASK LIST -->
    <ul id="list"></ul>

  </div>
</div>

<script>
function login(){
  document.getElementById("login").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

function logout(){
  location.reload();
}

const list=document.getElementById("list");

/* ADD TASK */
function addTask(){
  const text=document.getElementById("task").value;
  const pri=document.getElementById("priority").value;

  if(!text) return;

  const li=document.createElement("li");
  li.innerHTML=`
    <span>${text} (${pri})</span>
    <div class="actions">
      <i onclick="toggle(this)" class="fa fa-check"></i>
      <i onclick="del(this)" class="fa fa-trash"></i>
    </div>
  `;

  list.appendChild(li);
  document.getElementById("task").value="";
  update();
}

/* TOGGLE */
function toggle(el){
  el.closest("li").classList.toggle("completed");
  update();
}

/* DELETE */
function del(el){
  el.closest("li").remove();
  update();
}

/* UPDATE */
function update(){
  const total=list.children.length;
  const done=document.querySelectorAll(".completed").length;

  document.getElementById("total").innerText=total;
  document.getElementById("done").innerText=done;
  document.getElementById("pending").innerText=total-done;

  document.getElementById("bar").style.width= total? (done/total*100)+"%" : "0%";
}
</script>

</body>
</html>
